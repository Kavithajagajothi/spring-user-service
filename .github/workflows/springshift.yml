name: SpringShift Self-Healing Migration
on:
  push:
    branches: [springshift-migration]
  workflow_dispatch:

jobs:
  migrate-and-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: maven

      - name: Setup git
        run: |
          git config user.name "SpringShift Bot"
          git config user.email "bot@springshift.io"

      - name: OpenRewrite full migration
        run: |
          mvn -U org.openrewrite.maven:rewrite-maven-plugin:run \
            -Drewrite.recipeArtifactCoordinates=org.openrewrite.recipe:rewrite-spring:LATEST,org.openrewrite.recipe:rewrite-migrate-java:LATEST,org.openrewrite.recipe:rewrite-java-security:LATEST \
            -Drewrite.activeRecipes=org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_5,org.openrewrite.java.migrate.UpgradeToJava21,org.openrewrite.java.spring.security6.UpgradeSpringSecurity_6_3,org.openrewrite.java.migrate.jakarta.JavaxMigrationToJakarta,org.openrewrite.java.spring.boot3.SpringBootProperties_3_5,org.openrewrite.java.spring.security5.WebSecurityConfigurerAdapter \
            --no-transfer-progress 2>&1 || true
          git add -A
          git diff --staged --quiet || git commit -m "fix: OpenRewrite pass 1"

      - name: Build attempt 1
        id: build1
        run: mvn clean verify --no-transfer-progress -T 2 2>&1 | tee /tmp/build1.log; echo "EXIT=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Show compile errors
        if: steps.build1.outputs.EXIT != '0'
        run: |
          echo "=== COMPILE ERRORS ==="
          grep "\[ERROR\]" /tmp/build1.log | head -80 || true

      - name: Auto-fix compile errors
        if: steps.build1.outputs.EXIT != '0'
        run: |
          python3 - << 'PYEOF'
import re, os, glob
with open('/tmp/build1.log','r',errors='ignore') as f: log=f.read()
errors=[]
for m in re.finditer(r'\[ERROR\]\s+(/[^\s\[]+\.java):\[(\d+),\d+\]\s+(.+)',log):
    errors.append({'f':m.group(1),'l':int(m.group(2)),'m':m.group(3)})
print(f'Found {len(errors)} errors in {len(set(e[chr(102)] for e in errors))} files')
RULES=[
    ('cannot find symbol','javax.',lambda l:l.replace('javax.','jakarta.')),
    ('cannot find symbol','antMatchers(',lambda l:l.replace('antMatchers(','requestMatchers(')),
    ('cannot find symbol','mvcMatchers(',lambda l:l.replace('mvcMatchers(','requestMatchers(')),
    ('cannot find symbol','authorizeRequests()',lambda l:l.replace('authorizeRequests()','authorizeHttpRequests()')),
    ('cannot find symbol','MySQL8Dialect',lambda l:l.replace('MySQL8Dialect','MySQLDialect')),
    ('cannot find symbol','PostgreSQL95Dialect',lambda l:re.sub(r'PostgreSQL\w+Dialect','PostgreSQLDialect',l)),
    ('cannot find symbol','.and()',lambda l:l.replace('.and()','').rstrip()+';' if l.rstrip().endswith('.and();') else l.replace('.and()','') ),
    ('cannot find symbol','csrf().disable()',lambda l:l.replace('csrf().disable()','csrf(c->c.disable())')),
    ('method does not override','configure(',lambda l:'    //REMOVED:'+l.strip()),
    ('package','javax.',lambda l:l.replace('javax.','jakarta.')),
]
IMPORTS={
    'Entity':'import jakarta.persistence.Entity;',
    'Table':'import jakarta.persistence.Table;',
    'Column':'import jakarta.persistence.Column;',
    'Id':'import jakarta.persistence.Id;',
    'GeneratedValue':'import jakarta.persistence.GeneratedValue;',
    'GenerationType':'import jakarta.persistence.GenerationType;',
    'ManyToOne':'import jakarta.persistence.ManyToOne;',
    'OneToMany':'import jakarta.persistence.OneToMany;',
    'OneToOne':'import jakarta.persistence.OneToOne;',
    'ManyToMany':'import jakarta.persistence.ManyToMany;',
    'JoinColumn':'import jakarta.persistence.JoinColumn;',
    'JoinTable':'import jakarta.persistence.JoinTable;',
    'MappedSuperclass':'import jakarta.persistence.MappedSuperclass;',
    'Enumerated':'import jakarta.persistence.Enumerated;',
    'EnumType':'import jakarta.persistence.EnumType;',
    'Transient':'import jakarta.persistence.Transient;',
    'Lob':'import jakarta.persistence.Lob;',
    'EntityListeners':'import jakarta.persistence.EntityListeners;',
    'PrePersist':'import jakarta.persistence.PrePersist;',
    'PreUpdate':'import jakarta.persistence.PreUpdate;',
    'PostUpdate':'import jakarta.persistence.PostUpdate;',
    'Embedded':'import jakarta.persistence.Embedded;',
    'Embeddable':'import jakarta.persistence.Embeddable;',
    'CascadeType':'import jakarta.persistence.CascadeType;',
    'FetchType':'import jakarta.persistence.FetchType;',
    'NotNull':'import jakarta.validation.constraints.NotNull;',
    'NotBlank':'import jakarta.validation.constraints.NotBlank;',
    'NotEmpty':'import jakarta.validation.constraints.NotEmpty;',
    'Size':'import jakarta.validation.constraints.Size;',
    'Email':'import jakarta.validation.constraints.Email;',
    'Pattern':'import jakarta.validation.constraints.Pattern;',
    'Min':'import jakarta.validation.constraints.Min;',
    'Max':'import jakarta.validation.constraints.Max;',
    'Positive':'import jakarta.validation.constraints.Positive;',
    'Valid':'import jakarta.validation.Valid;',
    'Validated':'import jakarta.validation.Validated;',
    'Transactional':'import jakarta.transaction.Transactional;',
    'HttpServletRequest':'import jakarta.servlet.http.HttpServletRequest;',
    'HttpServletResponse':'import jakarta.servlet.http.HttpServletResponse;',
    'FilterChain':'import jakarta.servlet.FilterChain;',
    'ServletException':'import jakarta.servlet.ServletException;',
    'HttpSession':'import jakarta.servlet.http.HttpSession;',
    'SecurityFilterChain':'import org.springframework.security.web.SecurityFilterChain;',
    'AuthenticationManager':'import org.springframework.security.authentication.AuthenticationManager;',
    'AuthenticationConfiguration':'import org.springframework.security.config.annotation.authentication.configuration.AuthenticationConfiguration;',
    'SessionCreationPolicy':'import org.springframework.security.config.http.SessionCreationPolicy;',
    'BCryptPasswordEncoder':'import org.springframework.security.crypto.bcrypt.BCryptPasswordEncoder;',
    'GroupedOpenApi':'import org.springdoc.core.models.GroupedOpenApi;',
    'CircuitBreaker':'import io.github.resilience4j.circuitbreaker.annotation.CircuitBreaker;',
}
by={}
for e in errors: by.setdefault(e['f'],[]).append(e)
tot=0
for path,es in by.items():
    if not os.path.exists(path): continue
    with open(path,'r',errors='ignore') as f: lines=f.read().split('\n')
    changed=False
    for e in es:
        idx=e['l']-1
        if not(0<=idx<len(lines)): continue
        line=lines[idx]; msg=e['m']
        print(f'  [{e[chr(108)]}] {msg[:60]}')
        for tm,tl,fix in RULES:
            if tm.lower() in msg.lower() and tl in line:
                new=fix(line)
                if new!=line:
                    print(f'    FIX: {line.strip()[:50]}')
                    lines[idx]=new; changed=True; tot+=1; break
        sym=re.search(r'symbol:\s+class\s+(\S+)',msg)
        if sym and sym.group(1) in IMPORTS:
            imp=IMPORTS[sym.group(1)]; full='\n'.join(lines)
            if imp not in full:
                last=max((i for i,l in enumerate(lines) if l.strip().startswith('import ')),default=0)
                lines.insert(last+1,imp)
                print(f'    ADD: {imp}')
                changed=True; tot+=1
    if changed:
        with open(path,'w') as f: f.write('\n'.join(lines))
# Global javax sweep on ALL java files
for jf in glob.glob('src/**/*.java',recursive=True):
    with open(jf,'r',errors='ignore') as f: content=f.read()
    orig=content
    for pkg in ['persistence','validation','servlet','transaction','annotation','xml.bind','ws.rs','inject']:
        content=content.replace(f'javax.{pkg}.',f'jakarta.{pkg}.')
    if content!=orig:
        with open(jf,'w') as f: f.write(content)
        tot+=1; print(f'  SWEEP: {jf}')
print(f'Total fixes: {tot}')
PYEOF
          git add -A
          git diff --staged --quiet || git commit -m "fix: Auto-fix compile errors pass 1"

      - name: OpenRewrite pass 2
        if: steps.build1.outputs.EXIT != '0'
        run: |
          mvn -U org.openrewrite.maven:rewrite-maven-plugin:run \
            -Drewrite.recipeArtifactCoordinates=org.openrewrite.recipe:rewrite-spring:LATEST,org.openrewrite.recipe:rewrite-migrate-java:LATEST \
            -Drewrite.activeRecipes=org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_5,org.openrewrite.java.migrate.UpgradeToJava21,org.openrewrite.java.migrate.jakarta.JavaxMigrationToJakarta,org.openrewrite.java.spring.security6.UpgradeSpringSecurity_6_3 \
            --no-transfer-progress 2>&1 || true
          git add -A
          git diff --staged --quiet || git commit -m "fix: OpenRewrite pass 2"

      - name: Build attempt 2
        id: build2
        if: steps.build1.outputs.EXIT != '0'
        run: mvn clean verify --no-transfer-progress -T 2 2>&1 | tee /tmp/build2.log; echo "EXIT=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Auto-fix compile errors pass 2
        if: steps.build2.outputs.EXIT != '0'
        run: |
          grep "\[ERROR\]" /tmp/build2.log | head -40 || true
          python3 - << 'PYEOF2'
import re, os, glob
with open('/tmp/build2.log','r',errors='ignore') as f: log=f.read()
for jf in glob.glob('src/**/*.java',recursive=True):
    with open(jf,'r',errors='ignore') as f: content=f.read()
    orig=content
    for pkg in ['persistence','validation','servlet','transaction','annotation','xml.bind','ws.rs','inject','mail','jms','enterprise','interceptor']:
        content=content.replace(f'javax.{pkg}.',f'jakarta.{pkg}.')
    if content!=orig:
        with open(jf,'w') as f: f.write(content)
        print(f'Fixed: {jf}')
for m in re.finditer(r'\[ERROR\]\s+(/[^\s\[]+\.java):\[(\d+),\d+\]\s+(.+)',log):
    path=m.group(1); idx=int(m.group(2))-1; msg=m.group(3)
    if not os.path.exists(path): continue
    with open(path,'r',errors='ignore') as f: lines=f.read().split('\n')
    if not(0<=idx<len(lines)): continue
    line=lines[idx]
    if 'javax.' in line: lines[idx]=line.replace('javax.','jakarta.'); print(f'Fixed javax {path}:{idx+1}')
    elif 'antMatchers' in line: lines[idx]=line.replace('antMatchers(','requestMatchers('); print(f'Fixed antMatchers {path}:{idx+1}')
    elif 'authorizeRequests()' in line: lines[idx]=line.replace('authorizeRequests()','authorizeHttpRequests()'); print(f'Fixed authorizeRequests {path}:{idx+1}')
    with open(path,'w') as f: f.write('\n'.join(lines))
PYEOF2
          git add -A
          git diff --staged --quiet || git commit -m "fix: Auto-fix compile errors pass 2"

      - name: Final build
        run: mvn clean verify --no-transfer-progress -T 2 2>&1

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "feat: Spring Boot 3.5.0 + Java 21 Migration (SpringShift)"
          body: "SpringShift automated migration: Spring Boot 3.5.0 + Java 21 + jakarta + Security 6 + CVE fixes. Build verified on GitHub Actions."
          branch: springshift-migration
          base: main
          labels: migration,automated