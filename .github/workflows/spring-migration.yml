name: SpringShift Migration
on:
  push:
    branches: [springshift-migration]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: OpenRewrite full migration
        run: |
          mvn -U org.openrewrite.maven:rewrite-maven-plugin:run \
            -Drewrite.recipeArtifactCoordinates=org.openrewrite.recipe:rewrite-spring:LATEST,org.openrewrite.recipe:rewrite-migrate-java:LATEST,org.openrewrite.recipe:rewrite-java-security:LATEST \
            -Drewrite.activeRecipes=org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_5,org.openrewrite.java.migrate.UpgradeToJava21,org.openrewrite.java.spring.security6.UpgradeSpringSecurity_6_3,org.openrewrite.java.migrate.jakarta.JavaxMigrationToJakarta,org.openrewrite.java.spring.boot3.SpringBootProperties_3_5 \
            --no-transfer-progress 2>&1 || true
          git config user.name "SpringShift Bot"
          git config user.email "bot@springshift.io"
          git add -A
          git diff --staged --quiet || git commit -m "fix: OpenRewrite migration"

      - name: Build
        run: mvn clean verify --no-transfer-progress -T 2 2>&1

      - name: Create PR
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "feat: Spring Boot 3.5.0 + Java 21 Migration"
          body: "Automated migration by SpringShift"
          branch: springshift-migration
          base: main
          labels: migration,automated
