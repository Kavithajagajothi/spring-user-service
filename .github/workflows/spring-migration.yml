name: Spring Migration & Vulnerability Automation
on:
  workflow_dispatch:
    inputs:
      target_spring_boot_version:
        description: "Target Spring Boot version"
        required: false
        default: "3.4.3"
      dry_run:
        description: "Dry run"
        type: boolean
        default: false
env:
  JAVA_VERSION: "21"
jobs:
  resolve-versions:
    name: resolve-versions
    runs-on: ubuntu-latest
    outputs:
      spring_boot_version: ${{ steps.ver.outputs.spring_boot_version }}
    steps:
      - id: ver
        run: |
          if [ "${{ github.event.inputs.target_spring_boot_version }}" = "latest" ] || [ -z "${{ github.event.inputs.target_spring_boot_version }}" ]; then
            SB_VERSION=$(curl -s https://api.github.com/repos/spring-projects/spring-boot/releases/latest | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
          else
            SB_VERSION="${{ github.event.inputs.target_spring_boot_version }}"
          fi
          echo "spring_boot_version=$SB_VERSION" >> $GITHUB_OUTPUT
          echo "Resolved: $SB_VERSION"
  openrewrite-migration:
    name: openrewrite-migration
    runs-on: ubuntu-latest
    needs: resolve-versions
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: Run OpenRewrite
        run: |
          SB_VER="${{ needs.resolve-versions.outputs.spring_boot_version }}"
          mvn -B org.openrewrite.maven:rewrite-maven-plugin:run \
            -Drewrite.activeRecipes=\
          org.openrewrite.java.spring.boot3.UpgradeSpringBoot_3_4,\
          org.openrewrite.java.migrate.jakarta.JakartaEE10,\
          org.openrewrite.java.spring.security6.UpgradeSpringSecurity_6_3,\
          org.openrewrite.java.migrate.UpgradeToJava21,\
          org.openrewrite.java.RemoveUnusedImports,\
          org.openrewrite.java.OrderImports \
            --no-transfer-progress 2>&1 || true
          git config user.name "spring-migration-bot"
          git config user.email "bot@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: OpenRewrite migration to Spring Boot $SB_VER"
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: openrewrite-reports
          path: target/rewrite/
  dependency-alignment:
    name: dependency-alignment
    runs-on: ubuntu-latest
    needs: [resolve-versions, openrewrite-migration]
    steps:
      - uses: actions/checkout@v4
        with: {token: ${{ secrets.GITHUB_TOKEN }}, fetch-depth: 0}
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: "${{ env.JAVA_VERSION }}", cache: maven}
      - name: Update versions
        run: |
          SB_VER="${{ needs.resolve-versions.outputs.spring_boot_version }}"
          mvn -B versions:update-parent -DparentVersion=$SB_VER -DgenerateBackupPoms=false --no-transfer-progress || true
          mvn -B versions:use-latest-releases -Dincludes="org.springframework.boot:*" -DgenerateBackupPoms=false --no-transfer-progress || true
          mvn -B versions:use-latest-releases -Dincludes="org.springframework.security:*" -DgenerateBackupPoms=false --no-transfer-progress || true
          git config user.name "spring-migration-bot"
          git config user.email "bot@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: align dependencies to Spring Boot $SB_VER"
  vulnerability-scan-fix:
    name: vulnerability-scan-fix
    runs-on: ubuntu-latest
    needs: dependency-alignment
    steps:
      - uses: actions/checkout@v4
        with: {token: ${{ secrets.GITHUB_TOKEN }}, fetch-depth: 0}
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: "${{ env.JAVA_VERSION }}", cache: maven}
      - name: OWASP scan
        run: mvn -B org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=9 -Dformat=ALL --no-transfer-progress || true
      - uses: actions/upload-artifact@v4
        with:
          name: vulnerability-reports
          path: target/dependency-check-report.*
  build-validation:
    name: build-validation
    runs-on: ubuntu-latest
    needs: vulnerability-scan-fix
    steps:
      - uses: actions/checkout@v4
        with: {token: ${{ secrets.GITHUB_TOKEN }}, fetch-depth: 0}
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: "${{ env.JAVA_VERSION }}", cache: maven}
      - name: Build attempt 1
        id: build1
        run: mvn -B clean verify --no-transfer-progress 2>&1 | tee /tmp/build.log; echo "status=$?" >> $GITHUB_OUTPUT
        continue-on-error: true
      - name: Auto-fix if failed
        if: steps.build1.outcome == 'failure'
        run: |
          mvn -B org.openrewrite.maven:rewrite-maven-plugin:run \
            -Drewrite.activeRecipes=org.openrewrite.java.migrate.jakarta.JavaxMigrationToJakarta,org.openrewrite.java.RemoveUnusedImports \
            --no-transfer-progress || true
          git config user.name "spring-migration-bot"
          git config user.email "bot@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "fix: apply additional migration fixes"
      - name: Build attempt 2
        if: steps.build1.outcome == 'failure'
        run: mvn -B clean verify --no-transfer-progress
      - uses: actions/upload-artifact@v4
        if: always()
        with: {name: build-logs, path: /tmp/build.log}
  create-migration-pr:
    name: create-migration-pr
    runs-on: ubuntu-latest
    needs: build-validation
    steps:
      - uses: actions/checkout@v4
        with: {token: ${{ secrets.GITHUB_TOKEN }}, fetch-depth: 0}
      - name: Push branch and create PR
        run: |
          SB_VER="${{ needs.resolve-versions.outputs.spring_boot_version }}"
          BRANCH="chore/spring-migration-${SB_VER}-$(date +%Y%m%d)"
          git config user.name "spring-migration-bot"
          git config user.email "bot@github.com"
          git checkout -b $BRANCH || git checkout $BRANCH
          git push origin $BRANCH
          gh pr create --title "Spring Boot Migration → v$SB_VER" \
            --body "Auto-generated migration PR. See Actions run for full log." \
            --base main --head $BRANCH || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
